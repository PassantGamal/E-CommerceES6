<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHOP.CO – Your Cart</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Integral+CF:wght@400;700&family=Satoshi:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="top-bar" id="topBar">
      <p>
        Sign up and get 20% off to your first order. <a href="#">Sign Up Now</a>
      </p>
      <button
        class="top-bar-close"
        onclick="document.getElementById('topBar').style.display = 'none'"
      >
        ✕
      </button>
    </div>

    <nav class="navbar" id="navbar"></nav>

    <div class="cart-page-wrapper">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fas fa-chevron-right"></i>
        <span>Cart</span>
      </div>

      <h1 class="cart-page-title">Your Cart</h1>

      <div class="cart-layout">
        <div class="cart-items-col" id="cartItemsCol"></div>

        <div class="order-summary-col">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span class="label">Subtotal</span>
            <span id="summarySubtotal">$0</span>
          </div>
          <div class="summary-row">
            <span class="label">Discount (-20%)</span>
            <span class="discount-val" id="summaryDiscount">-$0</span>
          </div>
          <div class="summary-row">
            <span class="label">Delivery Fee</span>
            <span id="summaryDelivery">$15</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-total">
            <span>Total</span>
            <span id="summaryTotal">$15</span>
          </div>
          <div class="promo-wrap">
            <div class="promo-input-wrap">
              <i class="fas fa-tag"></i>
              <input type="text" id="promoInput" placeholder="Add promo code" />
            </div>
            <button class="btn-promo" id="btnPromo">Apply</button>
          </div>
          <button
            class="btn-checkout"
            id="btnCheckout"
            onclick="window.location.href = 'checkout.html'"
          >
            Go to Checkout <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>

    <section class="newsletter">
      <div class="newsletter-content">
        <h2>Stay Upto Date About Our Latest Offers</h2>
        <div class="newsletter-form">
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Enter your email address" />
          </div>
          <button class="btn-white">Subscribe to Newsletter</button>
        </div>
      </div>
    </section>

    <footer class="footer" id="footer"></footer>

    <script type="module" src="js/pages/cart-page.js"></script>
  </body>
</html>
